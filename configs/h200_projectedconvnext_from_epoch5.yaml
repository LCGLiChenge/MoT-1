# Current H200 run: resume current projected ConvNeXt discriminator branch from epoch_0005_step_00127360.pt.
# Paths are relative to this repository root.

data_path: ../ImageNet/train
output_dir: results/projectedconvnext_from_epoch5_h200_8gpu

adapter_init: weights/step_00066000.pt
adapter_init_ema: true
resume: weights/epoch_0005_step_00127360.pt
resume_non_strict: true
reset_optimizer: true
reset_discriminator: true
reset_selector_state: false

image_size: 256
titok_input_range: zero_1
llamagen_input_range: minus1_1
random_crop: false
random_flip: false
batch_size: 32
accum_steps: 1
max_steps: 145000
num_workers: 12
limit_samples: 0

train_adapter: false
train_llamagen_encoder: true
train_llamagen_quant_conv: true
train_llamagen_quantizer: true
train_post_quant_conv: true
train_llamagen_decoder: true
llamagen_decoder_train_last_n: -1
train_router: true
lr: 5.0e-6
lr_llamagen_encoder: 2.0e-7
lr_llamagen: 8.0e-7
lr_router: 0.0
lr_scheduler: constant
warmup_steps: 0
min_lr: 0.0
weight_decay: 0.01
weight_decay_llamagen: 0.0
weight_decay_router: 0.0
max_grad_norm: 1.0
mixed_precision: bf16
use_ema: true
ema_decay: 0.999

image_loss: l1
perceptual_loss: lpips
lambda_perceptual: 0.3
lambda_lpips: 0.3
lambda_base: 0.0
lambda_mix: 2.0
lambda_native: 0.0
lambda_mix_native: 0.0
lambda_mix_native_perceptual: 0.0
lambda_feat: 0.0
lambda_feat_moment: 0.0
lambda_disc_feature_matching: 0.0
lambda_lowfreq_anchor: 0.0
lambda_dino_feat: 0.0
lambda_router_budget: 2.0
lambda_router_binary: 0.01
lambda_router_ratio_target: 0.0

mask_ratio_min: 0.1
mask_ratio_max: 0.9
mask_selection: router_e2e_dynamic
mask_ratio: 0.5
mask_error_weight: 0.6
mask_gradient_weight: 0.3
mask_variance_weight: 0.1
selector_threshold: 0.3
target_mask_ratio: 0.5
use_threshold_ema_controller: false
selector_threshold_lr: 0.0
selector_ratio_ema_decay: 0.95
selector_threshold_min: 0.0
selector_threshold_max: 1.0
score_normalize_scope: per_image

router_hidden_dim: 128
router_depth: 3
router_min_ratio: 0.05
router_max_ratio: 0.90
router_target_mean_ratio: 0.50
router_min_tokens: -1
router_max_tokens: -1
router_tau: 0.7
router_detach_inputs: true
router_gain_aux_weight: 1.0
router_gain_aux_decay_steps: 0
router_gain_aux_target_ratio: 0.5
router_ratio_target_spread: 0.0
router_only_steps: 0
router_only_disable_gan: true

lambda_gan: 0.10
gan_start_step: 72000
gan_ramp_steps: 0
gan_g_ramp_after_d_warmup: false
gan_input_filter: none
gan_highpass_size: 64
discriminator_factor: 1.0
lr_d: 5.0e-5
d_every: 1
d_warmup_steps: 500
g_freeze_steps: 0
lecam_regularization_weight: 0.001
lecam_ema_decay: 0.999
discriminator_type: projected_convnext
disc_scales: [1.0]
disc_loss_weights: [1.0]
disc_hidden_channels: 128
disc_num_stages: 3
projected_input_size: 224
projected_head_hidden: 256
projected_loss_weights: [1.0, 1.0, 1.0, 1.0]
projected_pretrained: true
dino_repo: ../.cache/torch/hub/facebookresearch_dinov2_main
dino_model: dinov2_vits14
dino_input_size: 224
dino_loss_weight: 0.50
dino_head_hidden: 256
dino_use_patch_tokens: true

log_every: 50
sample_every: 0
sample_images: 0
save_every: 0
latest_every_epoch: true
save_epoch_every: 5
save_step_checkpoints: true
save_steps: [129360, 131360, 133360, 135360, 137360, 139360, 141360, 143360, 145000]

wandb: true
wandb_project: MoT
wandb_name: mot_h200_projectedconvnext_from_epoch5
wandb_entity: ""
wandb_mode: ""
wandb_tags: [h200, 8gpu, projectedconvnextD, gan010, mix2, from_epoch5]

lg_latent_channels: 256
lg_head_channels: 256
latent_head_mode: feature
codebook_temperature: 1.0

titok_root: ../1d-tokenizer
titok_config: ../1d-tokenizer/configs/infer/TiTok/titok_l32.yaml
titok_ckpt: ../1d-tokenizer/tokenizer_titok_l32.bin

llamagen_root: ../LlamaGen
llamagen_ckpt: ../LlamaGen/pretrained_models/vq_ds16_c2i.pt
codebook_size: 16384
codebook_embed_dim: 8
