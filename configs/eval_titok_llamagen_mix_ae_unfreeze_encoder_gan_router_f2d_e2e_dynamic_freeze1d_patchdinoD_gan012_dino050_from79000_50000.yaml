# 50k ImageNet val eval for the freeze-1D locked-Router patch+DINO-D GAN 0.12 / DINO 0.50 fine-tune.
# adapter_init restores the frozen 1D adapter from the 66000 checkpoint because
# freeze-1D training checkpoints only save trainable parameters.
# Example:
#   CUDA_VISIBLE_DEVICES=0 python3 eval_titok_llamagen_mix_metrics_router_f2d_e2e_dynamic.py \
#     --config configs/eval_titok_llamagen_mix_ae_unfreeze_encoder_gan_router_f2d_e2e_dynamic_freeze1d_patchdinoD_gan012_dino050_from79000_50000.yaml

ckpt: results/titok_llamagen_mix_ae_unfreeze_encoder_gan_router_f2d_e2e_dynamic_freeze1d_patchdinoD_gan012_dino050_from79000_4gpu/latest.pt
output_json: results/titok_llamagen_mix_ae_unfreeze_encoder_gan_router_f2d_e2e_dynamic_freeze1d_patchdinoD_gan012_dino050_from79000_4gpu/eval_router_f2d_e2e_dynamic_freeze1d_patchdinoD_gan012_dino050_50000.json
adapter_init: results/titok_llamagen_mix_ae_unfreeze_encoder_gan_from_latest_4gpu/step_00066000.pt
adapter_init_ema: true
require_latent_decoder: false

data_path: ../ImageNet/validation
num_images: 50000
batch_size: 8
num_workers: 4
image_size: 256
titok_input_range: zero_1
llamagen_input_range: minus1_1
mixed_precision: bf16
mask_selection: router_e2e_dynamic
mask_ratio: 0.5
mask_ratio_min: 0.1
mask_ratio_max: 0.9
mask_error_weight: 0.6
mask_gradient_weight: 0.3
mask_variance_weight: 0.1
selector_threshold: 0.3
use_checkpoint_selector_threshold: false
score_normalize_scope: per_image

router_hidden_dim: 128
router_depth: 3
router_min_ratio: 0.05
router_max_ratio: 0.90
router_target_mean_ratio: 0.50
router_min_tokens: -1
router_max_tokens: -1
router_tau: 0.7
router_detach_inputs: true

gain_texture_alpha: 0.2
gain_gradient_weight: 0.5
gain_variance_weight: 0.5
blend_gain_weight: 0.5
seed: 0
fid_feature: 2048
lpips_net: alex
eval_paths: [mix]

lg_latent_channels: 256
lg_head_channels: 256
titok_root: ../1d-tokenizer
titok_config: ../1d-tokenizer/configs/infer/TiTok/titok_l32.yaml
titok_ckpt: ../1d-tokenizer/tokenizer_titok_l32.bin
llamagen_root: ../LlamaGen
llamagen_ckpt: ../LlamaGen/pretrained_models/vq_ds16_c2i.pt
codebook_size: 16384
codebook_embed_dim: 8
